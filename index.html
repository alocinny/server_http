<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VisionFlow | Computer Vision Server</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #a78bfa;
            --primary-glow: rgba(167, 139, 250, 0.3);
            --accent: #34d399;
            --accent-glow: rgba(52, 211, 153, 0.25);
            --danger: #f87171;
            --bg: #080c14;
            --surface: rgba(15, 23, 42, 0.85);
            --surface-2: rgba(30, 41, 59, 0.6);
            --border: rgba(255, 255, 255, 0.06);
            --border-highlight: rgba(167, 139, 250, 0.25);
            --text: #e2e8f0;
            --text-dim: #64748b;
            --text-muted: #334155;
            --mono: 'DM Mono', monospace;
            --sans: 'Syne', sans-serif;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html { scroll-behavior: smooth; }

        body {
            background: var(--bg);
            color: var(--text);
            font-family: var(--sans);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            inset: 0;
            background-image:
                linear-gradient(rgba(167, 139, 250, 0.03) 1px, transparent 1px),
                linear-gradient(90deg, rgba(167, 139, 250, 0.03) 1px, transparent 1px);
            background-size: 48px 48px;
            pointer-events: none;
            z-index: 0;
        }

        nav {
            position: sticky;
            top: 0;
            z-index: 100;
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 2.5rem;
            background: rgba(8, 12, 20, 0.8);
            backdrop-filter: blur(20px);
            border-bottom: 1px solid var(--border);
        }

        .logo {
            font-size: 1rem;
            font-weight: 800;
            letter-spacing: 0.08em;
            text-transform: uppercase;
            color: var(--primary);
        }

        .nav-meta {
            display: flex;
            align-items: center;
            gap: 1.5rem;
        }

        .pill {
            font-family: var(--mono);
            font-size: 0.7rem;
            padding: 0.3rem 0.75rem;
            border-radius: 99px;
            border: 1px solid var(--border);
            color: var(--text-dim);
            background: var(--surface-2);
        }

        .live-pill {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            border-color: rgba(52, 211, 153, 0.3);
            color: var(--accent);
        }

        .live-dot {
            width: 6px; height: 6px;
            background: var(--accent);
            border-radius: 50%;
            box-shadow: 0 0 6px var(--accent);
            animation: blink 2s ease-in-out infinite;
        }

        @keyframes blink {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.3; }
        }

        .wrapper {
            position: relative;
            z-index: 1;
            max-width: 1100px;
            margin: 0 auto;
            padding: 2.5rem 2rem 5rem;
            display: grid;
            grid-template-columns: 1fr 300px;
            gap: 1.5rem;
        }

        @media (max-width: 860px) {
            .wrapper { grid-template-columns: 1fr; }
        }

        .feed-card {
            background: var(--surface);
            border: 1px solid var(--border-highlight);
            border-radius: 1.25rem;
            overflow: hidden;
            box-shadow: 0 0 0 1px var(--border), 0 40px 80px -20px rgba(0,0,0,0.6), inset 0 1px 0 rgba(255,255,255,0.05);
        }

        .feed-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 1rem 1.25rem;
            border-bottom: 1px solid var(--border);
            background: rgba(15, 23, 42, 0.5);
        }

        .feed-label {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-dim);
            text-transform: uppercase;
            letter-spacing: 0.1em;
        }

        .feed-id {
            font-family: var(--mono);
            font-size: 0.7rem;
            color: var(--text-muted);
        }

        .video-wrap {
            position: relative;
            width: 100%;
            aspect-ratio: 16/9;
            background: #000;
            overflow: hidden;
        }

        .video-wrap img { width: 100%; height: 100%; object-fit: contain; display: block; }
        .video-wrap canvas { display: none; }

        .corner {
            position: absolute; width: 20px; height: 20px;
            border-color: var(--primary); border-style: solid; opacity: 0.6;
        }
        .corner-tl { top: 12px; left: 12px; border-width: 2px 0 0 2px; }
        .corner-tr { top: 12px; right: 12px; border-width: 2px 2px 0 0; }
        .corner-bl { bottom: 12px; left: 12px; border-width: 0 0 2px 2px; }
        .corner-br { bottom: 12px; right: 12px; border-width: 0 2px 2px 0; }

        .scan-line {
            position: absolute; inset: 0;
            background: repeating-linear-gradient(to bottom, transparent 0px, transparent 3px, rgba(0,0,0,0.08) 3px, rgba(0,0,0,0.08) 4px);
            pointer-events: none;
        }

        .overlay-top {
            position: absolute; top: 12px; left: 50%; transform: translateX(-50%);
            display: flex; align-items: center; gap: 0.5rem;
            font-family: var(--mono); font-size: 0.65rem; color: var(--accent);
            text-transform: uppercase; letter-spacing: 0.1em;
        }

        .rec-indicator {
            display: none; align-items: center; gap: 0.4rem;
            position: absolute; top: 12px; right: 12px;
            font-family: var(--mono); font-size: 0.65rem; color: var(--danger);
            text-transform: uppercase; letter-spacing: 0.1em;
        }
        .rec-indicator.active { display: flex; }

        .rec-dot {
            width: 7px; height: 7px; background: var(--danger); border-radius: 50%;
            box-shadow: 0 0 8px var(--danger); animation: blink 0.8s ease-in-out infinite;
        }

        .action-bar {
            display: flex; gap: 0.75rem; padding: 1rem 1.25rem;
            border-top: 1px solid var(--border); background: rgba(15, 23, 42, 0.4);
        }

        .btn {
            flex: 1; padding: 0.7rem 1rem; border-radius: 0.625rem;
            border: 1px solid var(--border); background: var(--surface-2);
            color: var(--text); font-family: var(--sans); font-size: 0.8rem;
            font-weight: 600; cursor: pointer; transition: all 0.2s ease;
        }

        .btn:hover { background: rgba(255,255,255,0.07); transform: translateY(-1px); }
        .btn-primary { background: var(--primary-glow); border-color: var(--border-highlight); color: var(--primary); }
        .btn-danger { color: var(--danger); border-color: rgba(248, 113, 113, 0.3); background: rgba(248, 113, 113, 0.08); }

        .sidebar { display: flex; flex-direction: column; gap: 1rem; }
        .panel { background: var(--surface); border: 1px solid var(--border); border-radius: 1.25rem; overflow: hidden; }
        .panel-header { padding: 0.875rem 1.25rem; border-bottom: 1px solid var(--border); background: rgba(15,23,42,0.4); font-family: var(--mono); font-size: 0.65rem; text-transform: uppercase; color: var(--text-dim); }
        .panel-body { padding: 1.25rem; }

        .select-wrap { position: relative; }
        .select-wrap::after { content: '▾'; position: absolute; right: 1rem; top: 50%; transform: translateY(-50%); color: var(--text-dim); font-size: 0.75rem; pointer-events: none; }

        select {
            width: 100%; padding: 0.7rem 2.5rem 0.7rem 1rem; border-radius: 0.625rem;
            border: 1px solid var(--border); background: var(--surface-2);
            color: var(--text); font-family: var(--mono); font-size: 0.75rem;
            cursor: pointer; appearance: none; transition: all 0.2s;
        }

        .stat-row { display: flex; justify-content: space-between; align-items: center; padding: 0.6rem 0; border-bottom: 1px solid var(--border); }
        .stat-label { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; }
        .stat-value { font-family: var(--mono); font-size: 0.75rem; color: var(--text); }
        .stat-value.green { color: var(--accent); }
        .stat-value.purple { color: var(--primary); }

        .info-note { display: flex; gap: 0.75rem; padding: 0.875rem; background: rgba(52, 211, 153, 0.05); border: 1px solid rgba(52, 211, 153, 0.12); border-radius: 0.625rem; }
        .info-icon { font-size: 0.8rem; color: var(--accent); }
        .info-note p { font-family: var(--mono); font-size: 0.7rem; color: var(--text-dim); line-height: 1.6; }

        .feed-card, .panel { animation: fadeUp 0.4s ease both; }
        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

    <nav>
        <span class="logo">VisionFlow</span>
        <div class="nav-meta">
            <span class="pill live-pill"><span class="live-dot"></span>Live</span>
            <span class="pill">HTTP Server</span>
        </div>
    </nav>

    <div class="wrapper">
        <div class="feed-card">
            <div class="feed-header">
                <span class="feed-label">HOST CAMERA FEED</span>
                <span class="feed-id" id="feedTimestamp">--:--:--</span>
            </div>
            <div class="video-wrap">
                <img id="streamImg" src="/stream" crossorigin="anonymous" alt="Camera feed">
                <canvas id="recordCanvas"></canvas>
                <div class="corner corner-tl"></div><div class="corner corner-tr"></div>
                <div class="corner corner-bl"></div><div class="corner corner-br"></div>
                <div class="scan-line"></div>
                <div class="overlay-top"><span class="live-dot"></span><span id="modelLabel">LOADING...</span></div>
                <div class="rec-indicator" id="recIndicator"><span class="rec-dot"></span>REC</div>
            </div>
            <div class="action-bar">
                <button class="btn btn-primary" onclick="downloadSnapshot()">Download Photo</button>
                <button class="btn" id="recordBtn" onclick="toggleRecording()">Record Video</button>
            </div>
        </div>

        <aside class="sidebar">
            <div class="panel">
                <div class="panel-header">Detection Model</div>
                <div class="panel-body">
                    <div class="select-wrap">
                        <select id="modelSelect" onchange="updateModel()">
                            <option value="">Scanning models...</option>
                        </select>
                    </div>
                </div>
            </div>
            <div class="panel">
                <div class="panel-header">Session Info</div>
                <div class="panel-body">
                    <div class="stat-row"><span class="stat-label">Status</span><span class="stat-value green">Online</span></div>
                    <div class="stat-row"><span class="stat-label">Source</span><span class="stat-value">Host Camera</span></div>
                    <div class="stat-row"><span class="stat-label">Stream</span><span class="stat-value purple">/stream</span></div>
                    <div class="stat-row"><span class="stat-label">Recording</span><span class="stat-value" id="recStatusVal">—</span></div>
                </div>
            </div>
            <div class="panel"><div class="panel-body"><div class="info-note"><span class="info-icon">i</span><p>Files are saved directly to your device's <strong>Downloads</strong> folder.</p></div></div></div>
        </aside>
    </div>

    <script>
        const streamImg = document.getElementById('streamImg');
        const recordCanvas = document.getElementById('recordCanvas');
        const modelSelect = document.getElementById('modelSelect');
        const modelLabel = document.getElementById('modelLabel');

        function updateClock() {
            document.getElementById('feedTimestamp').textContent = new Date().toTimeString().slice(0, 8);
        }
        setInterval(updateClock, 1000);
        updateClock();

        function formatModelName(filename) {
            return filename.replace('.pt', '').replace('.onnx', '').replace(/_/g, ' ').toUpperCase();
        }

        async function loadModels() {
            try {
                const resp = await fetch('/models');
                const data = await resp.json();
                modelSelect.innerHTML = "";
                if (data.models.length === 0) {
                    modelSelect.innerHTML = "<option>No models found</option>";
                    modelLabel.textContent = "NO MODELS";
                    return;
                }
                data.models.forEach(model => {
                    const opt = document.createElement('option');
                    opt.value = model;
                    opt.innerText = formatModelName(model);
                    modelSelect.appendChild(opt);
                });
                modelLabel.textContent = formatModelName(data.models[0]);
            } catch (err) { console.error("Models fetch failed", err); }
        }

        async function updateModel() {
            const val = modelSelect.value;
            modelLabel.textContent = formatModelName(val);
            await fetch('/state', { method: 'PUT', body: JSON.stringify({ model: val }) });
        }

        function downloadSnapshot() {
            const canvas = document.createElement('canvas');
            canvas.width = streamImg.naturalWidth || 640;
            canvas.height = streamImg.naturalHeight || 480;
            canvas.getContext('2d').drawImage(streamImg, 0, 0);
            const link = document.createElement('a');
            link.download = `snap_${Date.now()}.jpg`;
            link.href = canvas.toDataURL('image/jpeg', 0.95);
            link.click();
        }

        let isRecording = false, mediaRecorder = null, recordedChunks = [];
        function toggleRecording() { isRecording ? stopRecording() : startRecording(); }

        function startRecording() {
            const canvas = recordCanvas;
            canvas.width = streamImg.naturalWidth || 640;
            canvas.height = streamImg.naturalHeight || 480;
            const ctx = canvas.getContext('2d');
            isRecording = true; recordedChunks = [];
            document.getElementById('recIndicator').classList.add('active');
            const btn = document.getElementById('recordBtn');
            btn.textContent = 'Stop & Save'; btn.classList.add('btn-danger');
            document.getElementById('recStatusVal').textContent = 'Active';

            const loop = () => { if (isRecording) { ctx.drawImage(streamImg, 0, 0); requestAnimationFrame(loop); } };
            loop();

            mediaRecorder = new MediaRecorder(canvas.captureStream(15), { mimeType: 'video/webm' });
            mediaRecorder.ondataavailable = e => { if (e.data.size > 0) recordedChunks.push(e.data); };
            mediaRecorder.onstop = () => {
                const a = document.createElement('a');
                a.href = URL.createObjectURL(new Blob(recordedChunks, { type: 'video/webm' }));
                a.download = `rec_${Date.now()}.webm`;
                a.click();
            };
            mediaRecorder.start();
        }

        function stopRecording() {
            isRecording = false; mediaRecorder.stop();
            document.getElementById('recIndicator').classList.remove('active');
            const btn = document.getElementById('recordBtn');
            btn.textContent = 'Record Video'; btn.classList.remove('btn-danger');
            document.getElementById('recStatusVal').textContent = '—';
        }

        loadModels();
    </script>
</body>
</html>
